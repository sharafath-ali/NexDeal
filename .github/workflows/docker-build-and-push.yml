name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Production Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker Buildx ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Docker Hub Login ─────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Extract Metadata (tags & labels) ─────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/nexdeal
          tags: |
            # Latest tag on main branch pushes
            type=raw,value=latest,enable={{is_default_branch}}
            # Branch name tag
            type=ref,event=branch
            # Full commit SHA tag
            type=sha,format=long,prefix=sha-
            # Short commit SHA tag
            type=sha,format=short,prefix=sha-
            # Timestamp-based production tag: prod-YYYYMMDD-HHmmss
            type=raw,value=prod-{{date 'YYYYMMDD-HHmmss'}},enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=NexDeal
            org.opencontainers.image.description=NexDeal backend API
            org.opencontainers.image.vendor=NexDeal

      # ── Build & Push ─────────────────────────────────────────────────────────
      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions cache backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GitHub Step Summary ───────────────────────────────────────────────────
      - name: Write Docker build summary
        if: always()
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/nexdeal"

          echo "## 🐳 Docker Build & Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.build-push.outcome }}" == "success" ]; then
            echo "### ✅ Image published successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Image:** \`${IMAGE}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Digest:** \`${{ steps.build-push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Tags published:**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            # Print each tag on its own line as a list item
            echo '${{ steps.meta.outputs.tags }}' | tr ',' '\n' | while read -r tag; do
              echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "### ❌ Image build or push failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the build logs above for details." >> $GITHUB_STEP_SUMMARY
          fi
