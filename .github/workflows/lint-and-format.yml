name: Lint & Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    name: ESLint & Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── ESLint ──────────────────────────────────────────────────────────────
      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true

      - name: Annotate ESLint failure
        if: steps.eslint.outcome == 'failure'
        run: |
          echo "::error title=ESLint Failed::ESLint found code quality issues. \
          Run \`npm run lint:fix\` locally to auto-fix them, then commit the changes."
          exit 1

      # ── Prettier ────────────────────────────────────────────────────────────
      - name: Run Prettier check
        id: prettier
        run: npm run format:check
        continue-on-error: true

      - name: Annotate Prettier failure
        if: steps.prettier.outcome == 'failure'
        run: |
          echo "::error title=Prettier Check Failed::Code formatting issues were detected. \
          Run \`npm run format\` locally to auto-format, then commit the changes."
          exit 1
