name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    name: Jest Test Suite
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      # Provide a minimal DATABASE_URL so the app can boot without a real DB.
      # Tests mock DB calls, so no live connection is needed.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Run Tests ───────────────────────────────────────────────────────────
      - name: Run tests
        id: run-tests
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
        continue-on-error: true

      # ── Upload Coverage ──────────────────────────────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      # ── GitHub Step Summary ──────────────────────────────────────────────────
      - name: Write test summary
        if: always()
        run: |
          if [ "${{ steps.run-tests.outcome }}" == "success" ]; then
            echo "## ✅ Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All tests passed successfully." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 Coverage report uploaded as an artifact (retained for **30 days**)." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more tests **failed**. Review the logs above for details." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "📦 Coverage report (partial) uploaded as an artifact (retained for **30 days**)." >> $GITHUB_STEP_SUMMARY
          fi

      # ── Fail the job if tests failed ─────────────────────────────────────────
      - name: Annotate test failure
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "::error title=Tests Failed::One or more Jest tests failed. \
          Check the test output and coverage report artifact for details."
          exit 1
