# ============================================================
# docker-compose.prod.yml
# Production — App only, connecting to Neon Cloud directly
# ============================================================
# Usage (with secrets from .env.production or CI secrets):
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# ============================================================

services:
  app:
    image: nexdeal:latest   # Build and push this image in your CI pipeline
    build:
      context: .
      dockerfile: Dockerfile
      target: runner        # Final lean production stage
    container_name: nexdeal-app-prod
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.production     # Provides DATABASE_URL pointing to neon.tech
    environment:
      NODE_ENV: production
      PORT: "3000"
    # No Neon Local service — traffic goes straight to Neon Cloud over TLS
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - nexdeal-prod-net

networks:
  nexdeal-prod-net:
    driver: bridge
