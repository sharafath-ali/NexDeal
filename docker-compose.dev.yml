# ============================================================
# docker-compose.dev.yml
# Development — App + Neon Local proxy (ephemeral branches)
# ============================================================
# Usage:
#   docker compose -f docker-compose.dev.yml --env-file .env.development up --build
# ============================================================
name: nexdeal-dev

services:
  # ── Neon Local proxy ──────────────────────────────────────
  neon-local:
    image: neondatabase/neon_local:latest
    container_name: nexdeal-neon-local
    ports:
      - "5432:5432"          # Expose locally for psql / drizzle-kit studio
    env_file:
      - .env.development
    # Persist branch metadata so the same branch survives hot-reloads
    # within a single session (avoids creating a new branch per app restart).
    volumes:
      - ./.neon_local/:/tmp/.neon_local
      - ./.git/HEAD:/tmp/.git/HEAD:ro,consistent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U neon || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - nexdeal-net

  # ── Application ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder      # Use the builder stage so nodemon / devDependencies are available
    container_name: nexdeal-app-dev
    command: ["node", "--watch", "src/index.js"]   # native Node watch (no nodemon needed)
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.development
    environment:
      # Override DATABASE_URL to use the service name as hostname
      DATABASE_URL: postgres://neon:npg@neon-local:5432/neondb
    volumes:
      - .:/app                        # Live source mount for hot-reload
      - /app/node_modules             # Prevent host node_modules from overriding
    depends_on:
      neon-local:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexdeal-net

networks:
  nexdeal-net:
    driver: bridge
